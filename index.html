  <script>
    // Fix Android Chrome address bar height
    function updateVhVariable() {
      const modal = document.getElementById('modal');
      if (modal && !modal.classList.contains('hidden')) return;
      const vh = window.visualViewport?.height || window.innerHeight;
      document.documentElement.style.setProperty('--app-height', vh + 'px');
      document.documentElement.style.setProperty('--vh', vh + 'px');
    }
    window.addEventListener('resize', updateVhVariable);
    window.addEventListener('orientationchange', updateVhVariable);
    window.visualViewport?.addEventListener('resize', updateVhVariable);
    updateVhVariable();

    const STORAGE_KEY = 'my_coupons_v2';
    const STORAGE_BACKUP_KEY = 'my_coupons_v2_backup';
    const LEGACY_STORAGE_KEYS = ['my_coupons', 'my_coupons_v1'];
    const ANNOUNCEMENTS = [
      { title: '歡迎使用 MyCoolPon', body: '你可以把連結型或圖片型酷碰卷集中保存在手機網頁中。', date: '2026-07-01' },
      { title: '記得備份資料', body: '酷碰卷會存在目前瀏覽器，換手機前建議先匯出 JSON 備份。', date: '2026-07-01' }
    ];
    function loadCoupons() {
      const keys = [STORAGE_KEY, ...LEGACY_STORAGE_KEYS];
      for (const key of keys) {
        const raw = localStorage.getItem(key);
        if (!raw) continue;
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) {
            const normalized = parsed.map(normalizeCoupon).filter(Boolean);
            // 保持使用同一個正式 key，避免日後功能更新換 key 造成資料看似遺失。
            if (key !== STORAGE_KEY) localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
            localStorage.setItem(STORAGE_BACKUP_KEY, JSON.stringify(normalized));
            return normalized;
          }
        } catch (err) {
          console.warn('localStorage coupons parse failed:', key, err);
        }
      }
      return [];
    }

    function normalizeCoupon(c) {
      if (!c || typeof c !== 'object') return null;
      return {
        id: String(c.id || Date.now() + Math.random()),
        name: String(c.name || ''),
        type: c.type === 'image' ? 'image' : 'link',
        used: !!c.used,
        createdAt: Number(c.createdAt || Date.now()),
        ...(c.code ? { code: String(c.code) } : {}),
        ...(c.link ? { link: String(c.link) } : {}),
        ...(c.image ? { image: String(c.image) } : {}),
        ...(c.expiry ? { expiry: String(c.expiry) } : {}),
        ...(c.notes ? { notes: String(c.notes) } : {})
      };
    }

    let coupons = loadCoupons();
    let currentImage = null;
    let currentType = 'link';
    let currentTab = 'unused';
    let galleryZoom = 1;
    let lastDistance = 0;

    function save() {
      const data = JSON.stringify(coupons.map(normalizeCoupon).filter(Boolean));
      localStorage.setItem(STORAGE_KEY, data);
      localStorage.setItem(STORAGE_BACKUP_KEY, data);
    }
    function isExpired(d) { return d && new Date(d) < new Date(new Date().toDateString()); }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-unused').classList.toggle('active', tab === 'unused');
      document.getElementById('tab-used').classList.toggle('active', tab === 'used');
      render();
    }

    function getFiltered() {
      const filterType = document.getElementById('filter-type').value;
      let items = coupons.filter(c => currentTab === 'unused' ? !c.used : !!c.used);
      if (filterType !== 'all') items = items.filter(c => c.type === filterType);
      const sortBy = document.getElementById('sort-select').value;
      items.sort((a, b) => {
        if (sortBy === 'expiry') {
          const ae = isExpired(a.expiry), be = isExpired(b.expiry);
          if (ae !== be) return ae ? 1 : -1;
          if (a.expiry && b.expiry) return new Date(a.expiry) - new Date(b.expiry);
          return a.expiry ? -1 : b.expiry ? 1 : 0;
        } else if (sortBy === 'name') {
          return (a.name || '').localeCompare(b.name || '');
        }
        return (b.createdAt || 0) - (a.createdAt || 0);
      });
      return items;
    }

    function render() {
      const list = document.getElementById('coupon-list');
      const items = getFiltered();
      const unusedCount = coupons.filter(c => !c.used).length;
      const usedCount = coupons.filter(c => !!c.used).length;
      document.getElementById('unused-count').textContent = unusedCount;
      document.getElementById('used-count').textContent = usedCount;

      document.getElementById('empty-state').classList.toggle('hidden', !(items.length === 0 && currentTab === 'unused'));
      document.getElementById('empty-used').classList.toggle('hidden', !(items.length === 0 && currentTab === 'used'));

      if (items.length === 0) { list.innerHTML = ''; return; }

      list.innerHTML = items.map(c => {
        const expired = isExpired(c.expiry);
        const expiryBadge = expired ? '<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">已過期</span>'
          : c.expiry ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">${c.expiry}</span>` : '';
        const typeTag = c.type === 'image' ? '<span class="text-xs bg-purple-100 text-purple-600 px-2 py-0.5 rounded-full">圖片</span>' : '<span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">連結</span>';
        const thumb = c.image ? `<img src="${c.image}" class="w-full h-32 object-cover rounded-xl mb-3 cursor-pointer" onclick="event.stopPropagation(); openGallery('${c.id}')">` : '<div class="w-full h-32 bg-amber-50 rounded-xl mb-3 flex items-center justify-center text-4xl">🎟️</div>';
        const useLabel = c.used ? '標為未使用' : '標為已使用';
        const useColor = c.used ? 'text-amber-600' : 'text-green-600';

        return `<div class="coupon-card bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden p-4 cursor-pointer ${expired && !c.used ? 'opacity-70' : ''}" onclick="openDetail('${c.id}')">
          ${thumb}
          <div class="flex items-start justify-between mb-2"><h3 class="font-semibold text-sm text-gray-900 leading-tight">${esc(c.name)}</h3></div>
          <div class="flex flex-wrap gap-1.5 mb-3">${typeTag}${expiryBadge}</div>
          ${c.code ? `<div class="flex items-center gap-2 mb-2"><span class="font-mono text-xs bg-gray-100 px-2 py-1 rounded">${esc(c.code)}</span><button onclick="event.stopPropagation(); copyCode('${esc(c.code)}')" class="text-amber-600 text-xs font-medium">複製</button></div>` : ''}
          ${c.link ? `<a href="${esc(c.link)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" class="text-blue-500 underline text-xs block truncate mb-2">${esc(c.link)}</a>` : ''}
          ${c.notes ? `<p class="text-gray-400 text-xs mb-2">${esc(c.notes)}</p>` : ''}
          <div class="flex gap-3 pt-3 border-t border-gray-50">
            <button onclick="event.stopPropagation(); toggleUsed('${c.id}')" class="use-action-btn ${c.used ? 'bg-amber-50 text-amber-700 hover:bg-amber-100' : 'bg-green-50 text-green-700 hover:bg-green-100'}">${useLabel}</button>
            <button onclick="event.stopPropagation(); confirmDel('${c.id}')" class="delete-action-btn text-gray-500 hover:text-red-500 hover:bg-red-50" id="del-${c.id}">刪除</button>
          </div>
        </div>`;
      }).join('');
      lucide.createIcons();
    }

    function openDetail(id) {
      const c = coupons.find(x => x.id === id);
      if (!c) return;
      document.getElementById('detail-name').textContent = c.name;
      let html = '<div class="space-y-4">';
      if (c.type === 'image' && c.image) {
        html += `<div><img src="${c.image}" class="w-full rounded-xl cursor-pointer hover:opacity-90" onclick="openGallery('${id}')" style="max-height:300px;object-fit:cover;"></div>`;
      } else if (c.type === 'link') {
        if (c.code) html += `<div><label class="text-xs font-medium text-gray-500">優惠碼</label><div class="flex items-center gap-2 mt-1"><span class="font-mono text-sm bg-gray-100 px-3 py-2 rounded flex-1">${esc(c.code)}</span><button onclick="copyCode('${esc(c.code)}')" class="text-amber-600 text-sm font-medium">複製</button></div></div>`;
        if (c.link) html += `<div><label class="text-xs font-medium text-gray-500">連結</label><a href="${esc(c.link)}" target="_blank" rel="noopener noreferrer" class="text-blue-500 underline text-sm block truncate mt-1">${esc(c.link)}</a></div>`;
      }
      if (c.expiry) {
        const exp = isExpired(c.expiry);
        html += `<div><label class="text-xs font-medium text-gray-500">到期日</label><div class="text-sm mt-1 font-medium ${exp ? 'text-red-600' : 'text-green-700'}">${c.expiry}${exp ? ' (已過期)' : ''}</div></div>`;
      }
      if (c.notes) html += `<div><label class="text-xs font-medium text-gray-500">備註</label><p class="text-sm text-gray-700 mt-1 whitespace-pre-wrap">${esc(c.notes)}</p></div>`;
      html += '</div>';
      document.getElementById('detail-content').innerHTML = html;
      document.getElementById('detail-modal').classList.remove('hidden');
    }

    function closeDetailModal() { document.getElementById('detail-modal').classList.add('hidden'); }

    function openGallery(id) {
      const c = coupons.find(x => x.id === id);
      if (!c || !c.image) return;
      galleryZoom = 1;
      const img = document.getElementById('gallery-img');
      img.src = c.image;
      img.style.transform = 'scale(1)';
      document.getElementById('gallery-modal').classList.remove('hidden');
    }

    function closeGalleryModal() { document.getElementById('gallery-modal').classList.add('hidden'); }

    // Gallery zoom via wheel
    document.addEventListener('wheel', function(e) {
      if (document.getElementById('gallery-modal').classList.contains('hidden')) return;
      e.preventDefault();
      galleryZoom = Math.max(1, Math.min(galleryZoom + (e.deltaY > 0 ? -0.1 : 0.1), 3));
      document.getElementById('gallery-img').style.transform = `scale(${galleryZoom})`;
    }, { passive: false });

    // Gallery zoom via pinch
    document.addEventListener('touchmove', function(e) {
      if (document.getElementById('gallery-modal').classList.contains('hidden') || e.touches.length !== 2) return;
      e.preventDefault();
      const touch1 = e.touches[0];
      const touch2 = e.touches[1];
      const distance = Math.hypot(touch2.clientX - touch1.clientX, touch2.clientY - touch1.clientY);
      if (lastDistance > 0) {
        const scaleFactor = (distance - lastDistance) / 100;
        galleryZoom = Math.max(1, Math.min(galleryZoom + scaleFactor, 3));
        
        // Calculate pinch center point
        const midX = (touch1.clientX + touch2.clientX) / 2;
        const midY = (touch1.clientY + touch2.clientY) / 2;
        
        // Get container and image dimensions
        const container = document.querySelector('.gallery-container');
        const img = document.getElementById('gallery-img');
        const containerRect = container.getBoundingClientRect();
        const imgRect = img.getBoundingClientRect();
        
        // Calculate position relative to image center
        const imgCenterX = (imgRect.left + imgRect.right) / 2;
        const imgCenterY = (imgRect.top + imgRect.bottom) / 2;
        
        // Offset from current image center
        const offsetX = midX - imgCenterX;
        const offsetY = midY - imgCenterY;
        
        // Update transform origin based on pinch point
        const originX = 50 + (offsetX / imgRect.width) * 50;
        const originY = 50 + (offsetY / imgRect.height) * 50;
        
        img.style.transformOrigin = originX + '% ' + originY + '%';
        img.style.transform = `scale(${galleryZoom})`;
      }
      lastDistance = distance;
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      if (document.getElementById('gallery-modal').classList.contains('hidden')) return;
      lastDistance = 0;
    }, { passive: false });


    function openMenu() {
      document.getElementById('side-menu').classList.add('open');
      document.getElementById('side-menu-backdrop').classList.add('open');
      document.getElementById('side-menu').setAttribute('aria-hidden', 'false');
    }

    function closeMenu() {
      document.getElementById('side-menu').classList.remove('open');
      document.getElementById('side-menu-backdrop').classList.remove('open');
      document.getElementById('side-menu').setAttribute('aria-hidden', 'true');
    }

    function renderAnnouncements() {
      const list = document.getElementById('announcement-list');
      if (!list) return;
      if (!ANNOUNCEMENTS.length) {
        list.innerHTML = '<div class="text-sm text-gray-400">目前沒有公告。</div>';
        return;
      }
      list.innerHTML = ANNOUNCEMENTS.map(item => `
        <article class="announcement-item">
          <div class="flex items-start justify-between gap-2 mb-1">
            <h3 class="text-sm font-bold text-gray-800">${esc(item.title)}</h3>
            <span class="text-[11px] text-gray-400 whitespace-nowrap">${esc(item.date)}</span>
          </div>
          <p class="text-xs text-gray-500 leading-relaxed">${esc(item.body)}</p>
        </article>
      `).join('');
    }

    function getExportPayload() {
      return {
        app: 'MyCoolPon',
        version: 3,
        storageKey: STORAGE_KEY,
        exportedAt: new Date().toISOString(),
        coupons: coupons.map(normalizeCoupon).filter(Boolean)
      };
    }

    function exportCouponsToJson() {
      const payload = getExportPayload();
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const date = new Date().toISOString().slice(0, 10).replaceAll('-', '');
      const a = document.createElement('a');
      a.href = url;
      a.download = `mycoolpon-backup-${date}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setImportStatus(`已匯出 ${payload.coupons.length} 筆酷碰卷備份。`, 'success');
    }

    function setImportStatus(message, type = 'info') {
      const el = document.getElementById('import-status');
      if (!el) return;
      el.textContent = message;
      el.className = 'import-status text-xs ' + (type === 'error' ? 'text-red-500' : type === 'success' ? 'text-green-600' : 'text-gray-500');
    }

    function extractCouponsFromImport(parsed) {
      if (Array.isArray(parsed)) return parsed;
      if (parsed && Array.isArray(parsed.coupons)) return parsed.coupons;
      if (parsed && parsed.data && Array.isArray(parsed.data.coupons)) return parsed.data.coupons;
      return null;
    }

    function mergeCoupons(imported) {
      const map = new Map();
      coupons.map(normalizeCoupon).filter(Boolean).forEach(c => map.set(c.id, c));
      imported.map(normalizeCoupon).filter(Boolean).forEach(c => map.set(c.id, c));
      return Array.from(map.values()).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    }

    function importCouponsFromJson(event) {
      const input = event.target;
      const file = input.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || ''));
          const importedRaw = extractCouponsFromImport(parsed);
          if (!importedRaw) throw new Error('JSON 格式不符合 MyCoolPon 備份格式');
          const imported = importedRaw.map(normalizeCoupon).filter(c => c && c.name);
          if (!imported.length) throw new Error('JSON 裡沒有可匯入的酷碰卷資料');
          coupons = mergeCoupons(imported);
          save();
          render();
          setImportStatus(`匯入完成：合併 ${imported.length} 筆，目前共 ${coupons.length} 筆。`, 'success');
        } catch (err) {
          console.error(err);
          setImportStatus('匯入失敗：請確認檔案是 MyCoolPon 匯出的 JSON。', 'error');
        } finally {
          input.value = '';
        }
      };
      reader.onerror = () => {
        setImportStatus('匯入失敗：檔案讀取發生問題。', 'error');
        input.value = '';
      };
      reader.readAsText(file);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeMenu();
        closeDetailModal();
        closeGalleryModal();
        closeModal();
      }
    });

    function toggleUsed(id) {
      const c = coupons.find(x => x.id === id);
      if (c) { c.used = !c.used; save(); render(); }
    }

    function confirmDel(id) {
      const btn = document.getElementById('del-' + id);
      if (btn.dataset.confirm) { coupons = coupons.filter(x => x.id !== id); save(); render(); }
      else { btn.textContent = '確認刪除？'; btn.dataset.confirm = '1'; btn.classList.add('text-red-500'); setTimeout(() => { if (btn) { btn.textContent = '刪除'; delete btn.dataset.confirm; btn.classList.remove('text-red-500'); } }, 3000); }
    }

    function copyCode(code) { navigator.clipboard.writeText(code).catch(() => {}); }

    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      // 不自動 focus，避免手機鍵盤彈出造成 visualViewport 高度改變，導致視窗打開時抖動。
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('add-form').reset();
      currentType = 'link';
      currentImage = null;
      setType('link');
      document.getElementById('image-preview').classList.add('hidden');
    }

    function setType(type) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
      document.getElementById('type-link-fields').classList.toggle('hidden', type !== 'link');
      document.getElementById('type-image-fields').classList.toggle('hidden', type !== 'image');
    }

    function handleImageUpload(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        currentImage = evt.target.result;
        document.getElementById('preview-img').src = currentImage;
        document.getElementById('image-preview').classList.remove('hidden');
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      currentImage = null;
      document.getElementById('image-input').value = '';
      document.getElementById('image-preview').classList.add('hidden');
    }

    function handleAddForm(e) {
      e.preventDefault();
      const name = document.getElementById('input-name').value.trim();
      if (!name) return;
      const coupon = { id: Date.now().toString(), name, type: currentType, used: false, createdAt: Date.now() };
      if (currentType === 'link') {
        const code = document.getElementById('input-code').value.trim();
        const link = document.getElementById('input-link').value.trim();
        if (code) coupon.code = code;
        if (link) coupon.link = link;
      } else if (currentImage) {
        coupon.image = currentImage;
      }
      const expiry = document.getElementById('input-expiry').value.trim();
      if (expiry) coupon.expiry = expiry;
      const notes = document.getElementById('input-notes').value.trim();
      if (notes) coupon.notes = notes;
      coupons.push(coupon);
      save();
      render();
      closeModal();
    }

    render();
    renderAnnouncements();
    lucide.createIcons();
  </script>
